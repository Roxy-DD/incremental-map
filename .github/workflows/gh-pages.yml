name: Build and Deploy Pages

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Pages mode)
        run: pnpm build
        env:
          CI: true
          VITE_APP_BASE: /${{ github.event.repository.name }}/
          VITE_ROUTER_MODE: hash

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check Pages API accessibility
        id: pages_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")

          if [ "$STATUS_CODE" = "200" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Pages API is accessible."
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Pages API is not accessible now (HTTP ${STATUS_CODE})."
            echo "Likely reason: Pages not enabled yet, or GITHUB_TOKEN lacks required repo/page permissions."
          fi

      - name: Skip deploy with guidance
        if: steps.pages_check.outputs.can_deploy != 'true'
        run: |
          echo "Skip deployment to avoid failing workflow."
          echo "Please ensure:"
          echo "1) Settings -> Pages -> Source = GitHub Actions"
          echo "2) Workflow permissions allow write access"
          echo "3) Runner token has access to Pages for this repository"

      - name: Deploy
        if: steps.pages_check.outputs.can_deploy == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
